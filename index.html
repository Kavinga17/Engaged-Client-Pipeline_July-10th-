region": "Auckland", "suburb": "Papatoetoe"}}, {"division": "NZ", "regionFile": "New Zealand", "consultant": "Keerthana", "client": "Otorohanga Medical - Otorohanga", "group": "Otorohanga Medical", "tappedDate": "2026-07-09", "feedback": "Unable to contact", "status": "Existing", "btStatus": "Signed", "detail": {"jobStatus": "On Hold", "country": "NZ", "state": "North Island", "region": "Waikato", "suburb": "Otorohanga"}}, {"division": "NZ", "regionFile": "New Zealand", "consultant": "Keerthana", "client": "Horowhenua Health Centre - Levin", "group": "Horowhenua Health Centre", "tappedDate": "2026-07-09", "feedback": "Interested", "status": "Existing", "btStatus": "Signed", "detail": {"jobStatus": "Active", "vr": "Yes", "country": "NZ", "state": "North Island", "region": "Mid Central", "suburb": "Levin"}}, {"division": "NZ", "regionFile": "New Zealand", "consultant": "Keerthana", "client": "Queen St Practice - Wairoa", "group": "Queen St Practice", "tappedDate": "2026-07-09", "feedback": "Unable to contact", "status": "Existing", "btStatus": "Signed", "detail": {"jobStatus": "On Hold", "country": "NZ", "state": "North Island", "region": "Hawkes Bay", "suburb": "Wairoa"}}]</script>
<script>
(function () {
  "use strict";
  var DATA = JSON.parse(document.getElementById("raw-data").textContent);

  var DETAIL_GROUPS = [
    { title: "Pathways", fields: [["Profession", "profession"], ["Speciality", "speciality"], ["Seniority", "seniority"], ["Skill Code", "skillCode"], ["VR", "vr"]] },
    { title: "Overseas Hire", fields: [["Overseas Recruitment", "overseas"], ["Sponsorship", "sponsorship"], ["Registered w/ IMMI", "registeredImmi"], ["Sponsorship Visa Type", "visaType"], ["Migration Service", "migrationService"], ["Visa Status", "visaStatus"]] },
    { title: "Geography", fields: [["Country", "country"], ["State", "state"], ["Region", "region"], ["Key City", "keyCity"], ["Suburb", "suburb"]] },
    { title: "Engagement Profile", fields: [["Engagement Type", "engagementType"], ["Employment Term", "employmentTerm"], ["Engagement Tenor", "engagementTenor"], ["Engagement Mode", "engagementMode"]] },
    { title: "Remuneration", fields: [["Gross Salary", "grossSalary"], ["Hourly Rate", "hourlyRate"], ["Billing Share", "billingShare"], ["Accommodation Support", "accommodation"], ["Travel Allowance", "travelAllowance"], ["Relocation Bonus", "relocationBonus"]] },
    { title: "Admin Details", fields: [["Job Campaign", "jobCampaign"], ["Collected Date", "collectedDate"]] }
  ];

  var DIVISION_ORDER = ["AHP", "GP Rural & SIMG", "GP Metro", "M-Circle", "MOD", "PLGP", "NZ"];

  function esc(s) {
    return (s === null || s === undefined) ? "" : String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function renderDetail(r) {
    var d = r.detail || {};
    var statusFields = [
      ["Tapped Date", r.tappedDate], ["Feedback", r.feedback], ["Client Status", r.status], ["BT Status", r.btStatus], ["Job Status", d.jobStatus]
    ].filter(function (f) { return f[1]; });
    var statusGroup = statusFields.length
      ? '<div class="detail-group"><h4>Status</h4>' +
        statusFields.map(function (f) { return '<div class="detail-field"><span class="k">' + esc(f[0]) + '</span><span class="v">' + esc(f[1]) + '</span></div>'; }).join("") +
        '</div>'
      : "";
    var html = statusGroup + DETAIL_GROUPS.map(function (g) {
      var present = g.fields.filter(function (f) { return d[f[1]]; });
      if (!present.length) return "";
      return '<div class="detail-group"><h4>' + esc(g.title) + '</h4>' +
        present.map(function (f) { return '<div class="detail-field"><span class="k">' + esc(f[0]) + '</span><span class="v">' + esc(d[f[1]]) + '</span></div>'; }).join("") +
        '</div>';
    }).join("");
    return html ? ('<div class="detail-groups">' + html + '</div>') : '<div class="detail-empty">No further pipeline details captured for this lead.</div>';
  }

  function groupBy(arr, keyFn) {
    var m = {};
    arr.forEach(function (item) {
      var k = keyFn(item);
      (m[k] = m[k] || []).push(item);
    });
    return m;
  }

  var byDivision = groupBy(DATA, function (r) { return r.division; });
  DIVISION_ORDER.forEach(function (div) { byDivision[div] = byDivision[div] || []; });
  var divisions = DIVISION_ORDER.slice();

  var FEEDBACK_ORDER = ["Interested", "Unable to contact", "No vacancy", "No agency", "Do not contact"];
  var FEEDBACK_TONE = { "Interested": "good", "Do not contact": "bad" };
  function toneForFeedback(fb) { return FEEDBACK_TONE[fb] || "warn"; }

  var MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  function formatIsoDateShort(iso) {
    var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso);
    if (!m) return iso;
    return parseInt(m[3], 10) + " " + MONTHS[parseInt(m[2], 10) - 1];
  }
  function buildDateChips(rows) {
    var counts = {};
    var blank = 0;
    rows.forEach(function (r) {
      if (r.tappedDate) counts[r.tappedDate] = (counts[r.tappedDate] || 0) + 1;
      else blank++;
    });
    var dates = Object.keys(counts).sort();
    var chips = dates.map(function (d) {
      return '<span class="date-chip" data-date="' + esc(d) + '"><span class="d">' + esc(formatIsoDateShort(d)) + '</span><span class="n">' + counts[d] + '</span></span>';
    });
    if (blank) {
      chips.push('<span class="date-chip no-date" data-date=""><span class="d">No date</span><span class="n">' + blank + '</span></span>');
    }
    if (!chips.length) {
      chips.push('<span class="date-chip no-date" data-date=""><span class="d">No date recorded</span><span class="n">' + rows.length + '</span></span>');
    }
    return chips.join("");
  }

  function buildConsultantHtml(divRows, div) {
    var byConsultant = groupBy(divRows, function (r) { return r.consultant; });
    var consultants = Object.keys(byConsultant).sort(function (a, b) {
      if (a === "Unassigned") return 1;
      if (b === "Unassigned") return -1;
      return byConsultant[b].length - byConsultant[a].length;
    });
    return consultants.map(function (cname) {
      var rows = byConsultant[cname];
      var rowsHtml = rows.map(function (r, i) {
        var rowId = div + "|" + cname + "|" + i;
        return '<div class="client-row" data-row="' + esc(rowId) + '" data-tapped="' + esc(r.tappedDate || "") + '">' +
          '<div class="row-main">' +
            '<span class="cname">' + esc(r.client) + '</span>' + (r.group ? '<span class="cgroup">' + esc(r.group) + '</span>' : '') +
            (r.tappedDate ? '<span class="ctapped">' + esc(r.tappedDate) + '</span>' : '') +
          '</div>' +
          '<div class="detail-slot" style="display:none">' + renderDetail(r) + '</div>' +
        '</div>';
      }).join("");
      return '<div class="consultant-block collapsed">' +
        '<div class="consultant-head" data-toggle="consultant">' +
          '<span class="name"><svg class="chev" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 1l5 4-5 4"/></svg>' + esc(cname) + '</span>' +
          '<span class="meta">' + buildDateChips(rows) + '</span>' +
        '</div>' +
        '<div class="consultant-body">' + rowsHtml + '</div>' +
      '</div>';
    }).join("");
  }

  var tabbar = document.getElementById("tabbar");
  var kpirow = document.getElementById("kpirow");
  var tree = document.getElementById("tree");
  var selRegion = document.getElementById("fRegion");

  function defaultFeedbackFor(div) {
    var has = byDivision[div].some(function (r) { return r.feedback === "Interested"; });
    return has ? "Interested" : null;
  }
  function uniqueSorted(arr) {
    return Array.from(new Set(arr.filter(Boolean))).sort();
  }

  var activeDivision = divisions[0];
  var activeFeedback = defaultFeedbackFor(activeDivision);
  var activeRegion = "";

  function renderTabs() {
    tabbar.innerHTML = divisions.map(function (div) {
      return '<button class="tab' + (div === activeDivision ? ' active' : '') + '" data-div="' + esc(div) + '">' +
        esc(div) + '</button>';
    }).join("");
  }

  function renderRegionOptions() {
    var divRows = byDivision[activeDivision];
    var regions = uniqueSorted(divRows.map(function (r) { return r.regionFile; }));
    selRegion.innerHTML = '<option value="">All locations</option>' + regions.map(function (v) { return '<option value="' + esc(v) + '">' + esc(v) + '</option>'; }).join("");
    selRegion.value = activeRegion;
  }

  function regionStateFiltered(divRows) {
    return divRows.filter(function (r) {
      if (activeRegion && r.regionFile !== activeRegion) return false;
      return true;
    });
  }

  function renderKpiRow() {
    var divRows = regionStateFiltered(byDivision[activeDivision]);
    var counts = {};
    divRows.forEach(function (r) {
      if (!r.feedback) return;
      counts[r.feedback] = (counts[r.feedback] || 0) + 1;
    });
    var keys = Object.keys(counts).sort(function (a, b) {
      var ia = FEEDBACK_ORDER.indexOf(a), ib = FEEDBACK_ORDER.indexOf(b);
      if (ia === -1) ia = 99; if (ib === -1) ib = 99;
      return ia - ib;
    });
    kpirow.innerHTML = keys.map(function (k) {
      return '<button class="kpicard' + (activeFeedback === k ? ' active' : '') + '" data-feedback="' + esc(k) + '">' +
        '<div class="klabel">' + esc(k) + '</div><div class="kvalue">' + counts[k] + '</div></button>';
    }).join("");
  }

  function renderPanel() {
    var divRows = regionStateFiltered(byDivision[activeDivision]);
    var rows = activeFeedback ? divRows.filter(function (r) { return r.feedback === activeFeedback; }) : divRows;
    var note = activeFeedback
      ? '<div class="filter-note tone-' + toneForFeedback(activeFeedback) + '">' +
        '<span class="fn-dot"></span>' +
        '<span class="fn-text">Showing only</span>' +
        '<span class="fn-chip">' + esc(activeFeedback) + '</span>' +
        '<span class="fn-spacer"></span>' +
        '<button data-clear-feedback>Clear filter <span class="fn-x">&times;</span></button>' +
        '</div>'
      : '';
    tree.innerHTML = '<div class="division-block">' + note + '<div class="division-body">' + buildConsultantHtml(rows, activeDivision) + '</div></div>';
  }

  selRegion.addEventListener("change", function () { activeRegion = selRegion.value; renderKpiRow(); renderPanel(); });

  tabbar.addEventListener("click", function (e) {
    var btn = e.target.closest(".tab");
    if (!btn) return;
    activeDivision = btn.getAttribute("data-div");
    activeFeedback = defaultFeedbackFor(activeDivision);
    activeRegion = "";
    renderTabs();
    renderRegionOptions();
    renderKpiRow();
    renderPanel();
  });
  kpirow.addEventListener("click", function (e) {
    var card = e.target.closest(".kpicard");
    if (!card) return;
    var fb = card.getAttribute("data-feedback");
    activeFeedback = (activeFeedback === fb) ? null : fb;
    renderKpiRow();
    renderPanel();
  });
  renderTabs();
  renderRegionOptions();
  renderKpiRow();
  renderPanel();

  tree.addEventListener("click", function (e) {
    if (e.target.closest("[data-clear-feedback]")) {
      activeFeedback = null;
      renderKpiRow();
      renderPanel();
      return;
    }
    var chip = e.target.closest(".date-chip");
    if (chip) {
      var block = chip.closest(".consultant-block");
      var date = chip.getAttribute("data-date");
      var wasActive = chip.classList.contains("active");
      block.querySelectorAll(".date-chip").forEach(function (c) { c.classList.remove("active"); });
      var body = block.querySelector(".consultant-body");
      var clientRows = body.querySelectorAll(".client-row");
      if (wasActive) {
        clientRows.forEach(function (row) { row.classList.remove("date-hidden"); });
      } else {
        chip.classList.add("active");
        block.classList.remove("collapsed");
        clientRows.forEach(function (row) {
          row.classList.toggle("date-hidden", row.getAttribute("data-tapped") !== date);
        });
      }
      return;
    }
    var head = e.target.closest("[data-toggle]");
    if (head) {
      var block = head.closest(".consultant-block");
      block.classList.toggle("collapsed");
      return;
    }
    var rowMain = e.target.closest(".row-main");
    if (rowMain) {
      var row = rowMain.closest(".client-row");
      var slot = row.querySelector(".detail-slot");
      var opening = slot.style.display === "none";
      slot.style.display = opening ? "block" : "none";
      row.classList.toggle("open", opening);
    }
  });
})();
</script>
